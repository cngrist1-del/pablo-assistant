<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcons Fury HD - BDC CRM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        :root {
            --primary: #1a1a1a;
            --secondary: #c41e3a;
            --accent: #f97316;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #ffffff;
            --text-muted: #a1a1a1;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: var(--primary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--secondary);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text);
        }
        
        .logo span {
            color: var(--secondary);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            padding: 1rem 2rem;
            background: var(--card);
        }
        
        .stat-card {
            background: var(--border);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--secondary);
        }
        
        /* Main Layout */
        .main {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1rem;
            padding: 1rem 2rem;
        }
        
        /* Sidebar */
        .sidebar {
            background: var(--card);
            border-radius: 12px;
            padding: 1rem;
            height: fit-content;
        }
        
        .sidebar h2 {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        .nav-item {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
            transition: background 0.2s;
        }
        
        .nav-item:hover, .nav-item.active {
            background: var(--border);
        }
        
        .nav-item .badge {
            background: var(--secondary);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        /* Content Area */
        .content {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .content-header h1 {
            font-size: 1.5rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--secondary);
            color: white;
        }
        
        .btn-primary:hover {
            background: #a01830;
        }
        
        /* Lead Cards */
        .lead-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1rem;
        }
        
        .lead-card {
            background: var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            border-left: 4px solid var(--secondary);
        }
        
        .lead-card.hot {
            border-left-color: var(--danger);
        }
        
        .lead-card.warm {
            border-left-color: var(--warning);
        }
        
        .lead-card.cold {
            border-left-color: var(--success);
        }
        
        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .lead-name {
            font-size: 1.25rem;
            font-weight: bold;
        }
        
        .lead-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .lead-status.scorching {
            background: var(--danger);
            color: white;
        }
        
        .lead-status.hot {
            background: var(--accent);
            color: white;
        }
        
        .lead-status.warm {
            background: var(--warning);
            color: black;
        }
        
        .lead-status.cold {
            background: var(--success);
            color: white;
        }
        
        .lead-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .lead-info-item {
            display: flex;
            flex-direction: column;
        }
        
        .lead-info-item label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .lead-info-item span {
            font-size: 0.95rem;
        }
        
        .lead-notes {
            background: var(--primary);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .lead-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
        }
        
        .btn-sm:hover {
            background: var(--border);
        }
        
        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--card);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal h2 {
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--primary);
            color: var(--text);
            font-size: 1rem;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }
        
        .tab {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            background: var(--border);
            color: var(--text-muted);
            font-weight: 600;
        }
        
        .tab.active {
            background: var(--secondary);
            color: white;
        }
        
        /* Table */
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        th {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        
        /* Search */
        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .search-bar input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--primary);
            color: var(--text);
            font-size: 1rem;
        }
        
        /* Notification */
        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--success);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            transform: translateY(100px);
            transition: transform 0.3s;
            z-index: 2000;
        }
        
        .notification.show {
            transform: translateY(0);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
            }
            
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .lead-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">FALCONS <span>FURY</span> HD</div>
        <div class="user-info">
            <span>BDC Cartel</span>
        </div>
    </header>
    
    <div class="stats-bar">
        <div class="stat-card">
            <h3>Total Leads</h3>
            <div class="number" id="totalLeads">0</div>
        </div>
        <div class="stat-card">
            <h3>Scorching</h3>
            <div class="number" id="scorchingLeads">0</div>
        </div>
        <div class="stat-card">
            <h3>Hot</h3>
            <div class="number" id="hotLeads">0</div>
        </div>
        <div class="stat-card">
            <h3>Appointments</h3>
            <div class="number" id="appointments">0</div>
        </div>
        <div class="stat-card">
            <h3>Closures</h3>
            <div class="number" id="closures">0</div>
        </div>
    </div>
    
    <main class="main">
        <aside class="sidebar">
            <h2>Pipeline</h2>
            <div class="nav-item active" data-filter="all">
                <span>All Leads</span>
                <span class="badge" id="allBadge">0</span>
            </div>
            <div class="nav-item" data-filter="scorching">
                <span>Scorching Hot</span>
                <span class="badge" id="scorchingBadge">0</span>
            </div>
            <div class="nav-item" data-filter="hot">
                <span>Hot</span>
                <span class="badge" id="hotBadge">0</span>
            </div>
            <div class="nav-item" data-filter="warm">
                <span>Warm</span>
                <span class="badge" id="warmBadge">0</span>
            </div>
            <div class="nav-item" data-filter="cold">
                <span>Cold</span>
                <span class="badge" id="coldBadge">0</span>
            </div>
            <div class="nav-item" data-filter="appointment">
                <span>Appointments</span>
                <span class="badge" id="appointmentBadge">0</span>
            </div>
            <div class="nav-item" data-filter="closed">
                <span>Closed</span>
                <span class="badge" id="closedBadge">0</span>
            </div>
            
            <h2 style="margin-top: 1.5rem;">Quick Actions</h2>
            <div class="nav-item" onclick="openModal('lead')">
                <span>+ Add Lead</span>
            </div>
            <div class="nav-item" onclick="openModal('appointment')">
                <span>+ Add Appointment</span>
            </div>
        </aside>
        
        <section class="content" id="mainContent">
            <div class="content-header">
                <h1 id="pageTitle">All Leads</h1>
                <button class="btn btn-primary" onclick="openModal('lead')">+ Add Lead</button>
            </div>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search leads by name, phone, or email..." oninput="filterLeads()">
            </div>
            
            <div class="lead-grid" id="leadGrid">
                <!-- Leads will be rendered here -->
            </div>
        </section>
    </main>
    
    <!-- Lead Modal -->
    <div class="modal-overlay" id="leadModal">
        <div class="modal">
            <h2 id="leadModalTitle">Add New Lead</h2>
            <form id="leadForm" onsubmit="saveLead(event)">
                <input type="hidden" id="leadId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="leadName" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="leadPhone" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="leadEmail">
                </div>
                <div class="form-group">
                    <label>Lead Source</label>
                    <select id="leadSource">
                        <option value="Internet">Internet</option>
                        <option value="Showroom">Showroom</option>
                        <option value="Phone">Phone</option>
                        <option value="Referral">Referral</option>
                        <option value="Trade">Trade</option>
                        <option value="Social">Social</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Interested Model</label>
                    <select id="leadModel">
                        <option value="">Select Model</option>
                        <option value="Road Glide">Road Glide</option>
                        <option value="Street Glide">Street Glide</option>
                        <option value="Road King">Road King</option>
                        <option value="Ultra Limited">Ultra Limited</option>
                        <option value="Trike">Trike</option>
                        <option value="Softail">Softail</option>
                        <option value="Sportster">Sportster</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="leadStatus">
                        <option value="scorching">Scorching Hot</option>
                        <option value="hot">Hot</option>
                        <option value="warm">Warm</option>
                        <option value="cold">Cold</option>
                        <option value="appointment">Appointment</option>
                        <option value="closed">Closed</option>
                        <option value="dead">Dead</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="leadNotes" placeholder="Enter any notes about this lead..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-sm" onclick="closeModal('lead')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Lead</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Appointment Modal -->
    <div class="modal-overlay" id="appointmentModal">
        <div class="modal">
            <h2>Schedule Appointment</h2>
            <form id="appointmentForm" onsubmit="saveAppointment(event)">
                <div class="form-group">
                    <label>Lead</label>
                    <select id="appointmentLead" required>
                        <option value="">Select Lead</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="appointmentDate" required>
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <input type="time" id="appointmentTime" required>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="appointmentNotes" placeholder="Appointment notes..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-sm" onclick="closeModal('appointment')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Schedule</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="notification" id="notification">Saved!</div>
    
    <script>
        // Data Store (Local Storage)
        let leads = JSON.parse(localStorage.getItem('falcons_leads')) || [];
        let appointments = JSON.parse(localStorage.getItem('falcons_appointments')) || [];
        let currentFilter = 'all';
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderStats();
            renderLeads();
            setupNav();
        });
        
        // Navigation
        function setupNav() {
            document.querySelectorAll('.nav-item[data-filter]').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentFilter = item.dataset.filter;
                    document.getElementById('pageTitle').textContent = item.querySelector('span').textContent;
                    renderLeads();
                });
            });
        }
        
        // Render Stats
        function renderStats() {
            document.getElementById('totalLeads').textContent = leads.length;
            document.getElementById('scorchingLeads').textContent = leads.filter(l => l.status === 'scorching').length;
            document.getElementById('hotLeads').textContent = leads.filter(l => l.status === 'hot').length;
            document.getElementById('appointments').textContent = appointments.length;
            document.getElementById('closures').textContent = leads.filter(l => l.status === 'closed').length;
            
            // Update badges
            document.getElementById('allBadge').textContent = leads.length;
            document.getElementById('scorchingBadge').textContent = leads.filter(l => l.status === 'scorching').length;
            document.getElementById('hotBadge').textContent = leads.filter(l => l.status === 'hot').length;
            document.getElementById('warmBadge').textContent = leads.filter(l => l.status === 'warm').length;
            document.getElementById('coldBadge').textContent = leads.filter(l => l.status === 'cold').length;
            document.getElementById('appointmentBadge').textContent = leads.filter(l => l.status === 'appointment').length;
            document.getElementById('closedBadge').textContent = leads.filter(l => l.status === 'closed').length;
        }
        
        // Render Leads
        function renderLeads() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filteredLeads = leads;
            
            // Apply filter
            if (currentFilter !== 'all') {
                filteredLeads = leads.filter(l => l.status === currentFilter);
            }
            
            // Apply search
            if (searchTerm) {
                filteredLeads = filteredLeads.filter(l => 
                    l.name.toLowerCase().includes(searchTerm) ||
                    (l.phone && l.phone.includes(searchTerm)) ||
                    (l.email && l.email.toLowerCase().includes(searchTerm))
                );
            }
            
            const grid = document.getElementById('leadGrid');
            
            if (filteredLeads.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>No leads found</h3>
                        <p>Add a new lead or adjust your filters</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filteredLeads.map(lead => `
                <div class="lead-card ${lead.status}">
                    <div class="lead-header">
                        <div class="lead-name">${lead.name}</div>
                        <span class="lead-status ${lead.status}">${formatStatus(lead.status)}</span>
                    </div>
                    <div class="lead-info">
                        <div class="lead-info-item">
                            <label>Phone</label>
                            <span>${lead.phone || '-'}</span>
                        </div>
                        <div class="lead-info-item">
                            <label>Email</label>
                            <span>${lead.email || '-'}</span>
                        </div>
                        <div class="lead-info-item">
                            <label>Source</label>
                            <span>${lead.source || '-'}</span>
                        </div>
                        <div class="lead-info-item">
                            <label>Model</label>
                            <span>${lead.model || '-'}</span>
                        </div>
                    </div>
                    ${lead.notes ? `<div class="lead-notes">${lead.notes}</div>` : ''}
                    <div class="lead-actions">
                        <button class="btn-sm" onclick="editLead('${lead.id}')">Edit</button>
                        <button class="btn-sm" onclick="quickAction('${lead.id}', 'call')">Call</button>
                        <button class="btn-sm" onclick="quickAction('${lead.id}', 'email')">Email</button>
                        <button class="btn-sm" onclick="quickAction('${lead.id}', 'text')">Text</button>
                        <button class="btn-sm btn-danger" onclick="deleteLead('${lead.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Filter Leads (Search)
        function filterLeads() {
            renderLeads();
        }
        
        // Format Status
        function formatStatus(status) {
            const statuses = {
                'scorching': 'Scorching',
                'hot': 'Hot',
                'warm': 'Warm',
                'cold': 'Cold',
                'appointment': 'Appointment',
                'closed': 'Closed',
                'dead': 'Dead'
            };
            return statuses[status] || status;
        }
        
        // Open Modal
        function openModal(type) {
            if (type === 'lead') {
                document.getElementById('leadForm').reset();
                document.getElementById('leadId').value = '';
                document.getElementById('leadModalTitle').textContent = 'Add New Lead';
                document.getElementById('leadModal').classList.add('active');
            } else if (type === 'appointment') {
                // Populate lead dropdown
                const select = document.getElementById('appointmentLead');
                select.innerHTML = '<option value="">Select Lead</option>' + 
                    leads.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
                document.getElementById('appointmentModal').classList.add('active');
            }
        }
        
        // Close Modal
        function closeModal(type) {
            document.getElementById(type + 'Modal').classList.remove('active');
        }
        
        // Save Lead
        function saveLead(e) {
            e.preventDefault();
            
            const id = document.getElementById('leadId').value || Date.now().toString();
            const lead = {
                id,
                name: document.getElementById('leadName').value,
                phone: document.getElementById('leadPhone').value,
                email: document.getElementById('leadEmail').value,
                source: document.getElementById('leadSource').value,
                model: document.getElementById('leadModel').value,
                status: document.getElementById('leadStatus').value,
                notes: document.getElementById('leadNotes').value,
                createdAt: document.getElementById('leadId').value ? 
                    leads.find(l => l.id === id)?.createdAt : new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            const existingIndex = leads.findIndex(l => l.id === id);
            if (existingIndex >= 0) {
                leads[existingIndex] = lead;
            } else {
                leads.push(lead);
            }
            
            localStorage.setItem('falcons_leads', JSON.stringify(leads));
            closeModal('lead');
            renderStats();
            renderLeads();
            showNotification('Lead saved!');
        }
        
        // Edit Lead
        function editLead(id) {
            const lead = leads.find(l => l.id === id);
            if (!lead) return;
            
            document.getElementById('leadId').value = lead.id;
            document.getElementById('leadName').value = lead.name;
            document.getElementById('leadPhone').value = lead.phone;
            document.getElementById('leadEmail').value = lead.email;
            document.getElementById('leadSource').value = lead.source;
            document.getElementById('leadModel').value = lead.model;
            document.getElementById('leadStatus').value = lead.status;
            document.getElementById('leadNotes').value = lead.notes;
            
            document.getElementById('leadModalTitle').textContent = 'Edit Lead';
            document.getElementById('leadModal').classList.add('active');
        }
        
        // Delete Lead
        function deleteLead(id) {
            if (confirm('Are you sure you want to delete this lead?')) {
                leads = leads.filter(l => l.id !== id);
                localStorage.setItem('falcons_leads', JSON.stringify(leads));
                renderStats();
                renderLeads();
                showNotification('Lead deleted');
            }
        }
        
        // Quick Action
        function quickAction(id, action) {
            const lead = leads.find(l => l.id === id);
            if (!lead) return;
            
            // In a real app, this would integrate with your communication system
            if (action === 'call') {
                window.location.href = `tel:${lead.phone}`;
            } else if (action === 'email') {
                window.location.href = `mailto:${lead.email}`;
            } else if (action === 'text') {
                window.location.href = `sms:${lead.phone}`;
            }
        }
        
        // Save Appointment
        function saveAppointment(e) {
            e.preventDefault();
            
            const appointment = {
                id: Date.now().toString(),
                leadId: document.getElementById('appointmentLead').value,
                date: document.getElementById('appointmentDate').value,
                time: document.getElementById('appointmentTime').value,
                notes: document.getElementById('appointmentNotes').value,
                createdAt: new Date().toISOString()
            };
            
            appointments.push(appointment);
            localStorage.setItem('falcons_appointments', JSON.stringify(appointments));
            
            // Update lead status to appointment
            const leadIndex = leads.findIndex(l => l.id === appointment.leadId);
            if (leadIndex >= 0) {
                leads[leadIndex].status = 'appointment';
                leads[leadIndex].updatedAt = new Date().toISOString();
                localStorage.setItem('falcons_leads', JSON.stringify(leads));
            }
            
            closeModal('appointment');
            renderStats();
            renderLeads();
            showNotification('Appointment scheduled!');
        }
        
        // Show Notification
        function showNotification(message) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
