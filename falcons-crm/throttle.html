<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Throttle Response BDC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--card:#1a1a1a;--border:#2a2a2a;--red:#c41e3a;--text:#fff;--muted:#aaa}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;padding:1rem}
h1{color:var(--red);margin-bottom:1rem}
.stats{display:flex;gap:1rem;margin-bottom:2rem}
.stat{background:var(--card);padding:1rem 2rem;border-radius:8px}
.stat b{color:var(--red);font-size:1.5rem}
.btn{background:var(--red);color:#fff;padding:0.75rem 1.5rem;border:none;border-radius:8px;cursor:pointer;margin-right:0.5rem}
.btn:hover{opacity:0.9}
.lead{background:var(--card);padding:1rem;border-radius:8px;margin-bottom:1rem;border-left:4px solid var(--red)}
.lead.hot{border-left-color:#ef4444}
.lead.warm{border-left-color:#eab308}
.lead.cold{border-left-color:#22c55e}
.lead-header{display:flex;justify-content:space-between;align-items:center}
.lead-name{font-size:1.2rem;font-weight:bold}
.status{padding:0.25rem 0.75rem;border-radius:20px;font-size:0.75rem;text-transform:uppercase}
.status.scorching{background:#ef4444}
.status.hot{background:#f97316}
.status.warm{background:#eab308;color:#000}
.status.cold{background:#22c55e}
.info{display:flex;gap:2rem;margin:1rem 0;color:var(--muted)}
input,select,textarea{width:100%;padding:0.75rem;margin-bottom:1rem;background:var(--border);border:1px solid var(--border);color:var(--text);border-radius:8px}
textarea{min-height:80px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);align-items:center;justify-content:center;z-index:1000}
.modal.active{display:flex}
.modal-content{background:var(--card);padding:2rem;border-radius:16px;width:90%;max-width:400px}
.actions{margin-top:1rem}
.search{width:100%;padding:0.75rem;margin-bottom:1rem;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px}
</style>
</head>
<body>
<h1>THROTTLE RESPONSE BDC</h1>
<div class="stats" id="stats"></div>
<button class="btn" onclick="openModal()">+ ADD LEAD</button>
<button class="btn" onclick="renderLeads()">REFRESH</button>
<input type="text" class="search" placeholder="Search leads..." oninput="renderLeads(this.value)">
<div id="leads"></div>

<div class="modal" id="modal">
<div class="modal-content">
<h2 id="modalTitle">Add Lead</h2>
<input type="hidden" id="leadId">
<label>Name</label><input type="text" id="name" required>
<label>Phone</label><input type="tel" id="phone" required>
<label>Email</label><input type="email" id="email">
<label>Source</label><select id="source"><option>Internet</option><option>Showroom</option><option>Phone</option><option>Referral</option></select>
<label>Model</label><select id="model"><option></option><option>Road Glide</option><option>Street Glide</option><option>Road King</option><option>Ultra Limited</option><option>Trike</option><option>Softail</option><option>Sportster</option></select>
<label>Status</label><select id="status"><option value="scorching">Scorching Hot</option><option value="hot">Hot</option><option value="warm">Warm</option><option value="cold">Cold</option></select>
<label>Notes</label><textarea id="notes"></textarea>
<div class="actions">
<button class="btn" onclick="saveLead()">SAVE</button>
<button class="btn" style="background:#555" onclick="closeModal()">CANCEL</button>
<button class="btn" style="background:#ef4444" onclick="deleteLead()">DELETE</button>
</div>
</div>
</div>

<script>
let leads = JSON.parse(localStorage.getItem('throttle_leads'))||[];
render();
function render(){
let s=leads.filter(l=>l.status==='scorching').length;
let h=leads.filter(l=>l.status==='hot').length;
document.getElementById('stats').innerHTML=`<div class="stat"><b>${leads.length}</b><br>Total</div><div class="stat"><b>${s}</b><br>Scorching</div><div class="stat"><b>${h}</b><br>Hot</div>`;
renderLeads();
}
function renderLeads(search){
let html='';
let filtered=search?leads.filter(l=>l.name.toLowerCase().includes(search.toLowerCase())):leads;
filtered.forEach(l=>{
html+=`<div class="lead ${l.status}">
<div class="lead-header"><span class="lead-name">${l.name}</span><span class="status ${l.status}">${l.status}</span></div>
<div class="info"><span>${l.phone}</span><span>${l.email}</span><span>${l.model}</span></div>
<p style="color:var(--muted)">${l.notes||''}</p>
<button class="btn" style="padding:0.5rem" onclick="editLead('${l.id}')">EDIT</button>
<button class="btn" style="padding:0.5rem" onclick="location.href='tel:${l.phone}'">CALL</button>
</div>`;
});
document.getElementById('leads').innerHTML=html||'<p style="color:var(--muted);text-align:center;margin-top:2rem">No leads yet</p>';
}
function openModal(){document.getElementById('leadId').value='';document.getElementById('name').value='';document.getElementById('phone').value='';document.getElementById('email').value='';document.getElementById('notes').value='';document.getElementById('modal').classList.add('active');document.getElementById('modalTitle').innerText='Add Lead'}
function closeModal(){document.getElementById('modal').classList.remove('active')}
function saveLead(){
let id=document.getElementById('leadId').value||Date.now().toString();
let lead={id,name:document.getElementById('name').value,phone:document.getElementById('phone').value,email:document.getElementById('email').value,source:document.getElementById('source').value,model:document.getElementById('model').value,status:document.getElementById('status').value,notes:document.getElementById('notes').value};
let i=leads.findIndex(l=>l.id===id);
if(i>=0)leads[i]=lead;else leads.push(lead);
localStorage.setItem('throttle_leads',JSON.stringify(leads));
closeModal();render();
}
function editLead(id){
let l=leads.find(x=>x.id===id);
if(!l)return;
document.getElementById('leadId').value=l.id;
document.getElementById('name').value=l.name;
document.getElementById('phone').value=l.phone;
document.getElementById('email').value=l.email;
document.getElementById('source').value=l.source;
document.getElementById('model').value=l.model;
document.getElementById('status').value=l.status;
document.getElementById('notes').value=l.notes;
document.getElementById('modal').classList.add('active');
document.getElementById('modalTitle').innerText='Edit Lead';
}
function deleteLead(){
if(confirm('Delete this lead?')){
let id=document.getElementById('leadId').value;
leads=leads.filter(l=>l.id!==id);
localStorage.setItem('throttle_leads',JSON.stringify(leads));
closeModal();render();
}
}
</script>
</body>
</html>
