<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ThrottleBDC | CRM</title>
    <script>
        // Clear any invalid tokens
        const token = localStorage.getItem('token');
        if (token && token !== 'throttle_bdc_secure_2026') {
            localStorage.removeItem('token');
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; }
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-container { background: #111; padding: 40px; border-radius: 12px; border: 1px solid #222; width: 100%; max-width: 400px; }
        .logo { font-size: 32px; font-weight: bold; color: #e53935; text-align: center; margin-bottom: 8px; }
        .logo span { color: #fff; }
        .tagline { color: #666; text-align: center; margin-bottom: 32px; }
        .input { width: 100%; padding: 14px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 16px; }
        .btn { width: 100%; padding: 14px; background: #e53935; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
        .error { color: #ff5252; text-align: center; margin-top: 16px; display: none; }
        .app { display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #111; border-right: 1px solid #222; padding: 20px; }
        .logo-small { font-size: 24px; font-weight: bold; color: #e53935; margin-bottom: 30px; }
        .nav-item { padding: 12px 16px; color: #888; cursor: pointer; border-radius: 8px; margin-bottom: 4px; }
        .nav-item-active { background: #1a1a1a; color: #fff; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 60px; background: #111; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .content { flex: 1; display: flex; overflow: hidden; }
        .lead-list { width: 350px; background: #0f0f0f; border-right: 1px solid #222; overflow-y: auto; }
        .lead-item { padding: 16px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .lead-item-active { background: #1a1a1a; border-left: 3px solid #e53935; }
        .lead-name { font-weight: 600; margin-bottom: 4px; }
        .lead-meta { font-size: 12px; color: #666; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; background: #e53935; color: #fff; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid #222; }
        .chat-messages { flex: 1; padding: 24px; overflow-y: auto; }
        .message-bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; margin-bottom: 12px; }
        .message-inbound { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message-outbound { background: #e53935; align-self: flex-end; border-bottom-right-radius: 4px; color: #fff; }
        .chat-input { padding: 16px 24px; border-top: 1px solid #222; display: flex; gap: 12px; }
        .input-msg { flex: 1; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; }
        .btn-send { padding: 12px 24px; background: #e53935; border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; }
        .stats-row { display: flex; padding: 20px; gap: 16px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 150px; background: #111; border-radius: 12px; padding: 20px; border: 1px solid #222; }
        .stat-number { font-size: 32px; font-weight: bold; color: #e53935; }
        .stat-label { font-size: 12px; color: #666; margin-top: 4px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="login-screen" id="loginView">
        <div class="login-container">
            <div class="logo">THROTTLE<span>BDC</span></div>
            <div class="tagline">Motorcycle Dealership CRM</div>
            <form id="loginForm">
                <input type="email" class="input" id="email" placeholder="Email" value="admin@throttlebdc.com" required>
                <input type="password" class="input" id="password" placeholder="Password" required>
                <button type="submit" class="btn" id="loginBtn">Login</button>
            </form>
            <div class="error" id="error">Invalid credentials</div>
        </div>
    </div>
    <div class="app hidden" id="crmView">
        <div class="sidebar">
            <div class="logo-small">THROTTLE<span>BDC</span></div>
            <div class="nav-item nav-item-active" onclick="setView('leads')">Leads</div>
            <div class="nav-item" onclick="setView('dashboard')">Dashboard</div>
            <div class="nav-item" onclick="logout()">Logout</div>
            <div style="margin-top:auto;color:#666;font-size:12px;">Logged in as Admin</div>
        </div>
        <div class="main">
            <div class="header">
                <div style="font-size:18px;font-weight:600" id="headerTitle">Leads</div>
                <div style="color:#666;font-size:14px" id="currentDate"></div>
            </div>
            <div class="content">
                <div class="lead-list" id="leadList">
                    <div style="padding:16px;border-bottom:1px solid #222;">
                        <input class="input-msg" style="width:100%;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:10px;color:#fff;" placeholder="Search leads...">
                    </div>
                    <div id="leadsContainer"></div>
                </div>
                <div class="chat-panel" id="chatPanel">
                    <div style="padding:40px;text-align:center;color:#444;">Select a lead to view</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const TOKEN = 'throttle_bdc_secure_2026';
        const ADMIN_USER = 'admin@throttlebdc.com';
        const ADMIN_PASS = 'admin123';
        let token = localStorage.getItem('token');
        let leads = [
            {id:'1',name:'Steven Hall',phone:'(954) 826-9405',email:'slippijr@yahoo.com',source:'email',status:'new'},
            {id:'2',name:'Daryl Jones',phone:'(678) 755-6450',source:'email',status:'contacted'},
            {id:'3',name:'Charity Youngblood',phone:'(404) 824-5423',source:'email',status:'new'},
            {id:'4',name:'Ronnie Wells',phone:'770-230-6879',source:'phone',status:'appointment'}
        ];
        let selectedLead = null;
        let messages = [];

        function checkAuth() {
            if (!token) return showLogin();
            if (token !== TOKEN) { localStorage.removeItem('token'); return showLogin(); }
            showCRM();
            loadLeads();
        }
        function showLogin() {
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('crmView').classList.add('hidden');
        }
        function showCRM() {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('crmView').classList.remove('hidden');
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString();
        }
        function loadLeads() { renderLeads(); }
        function renderLeads() {
            const container = document.getElementById('leadsContainer');
            container.innerHTML = leads.map(lead => '<div class="lead-item '+(selectedLead?.id===lead.id?'lead-item-active':'')+'" onclick="selectLead(\''+lead.id+'\')"><div class="lead-name">'+(lead.name||'Unknown')+'</div><div class="lead-meta">'+(lead.phone||'')+' • '+(lead.source||'email')+'</div><div style="margin-top:4px"><span class="badge">'+(lead.status||'new')+'</span></div></div>').join('');
        }
        function selectLead(id) {
            selectedLead = leads.find(l => l.id === id);
            renderLeads();
            messages = [
                {id:1,content:'Hi, I\'m interested in a touring bike',direction:'inbound',timestamp:new Date().toISOString()},
                {id:2,content:'Great! Let me show you what we have',direction:'outbound',timestamp:new Date().toISOString()}
            ];
            renderChat();
        }
        function renderChat() {
            const panel = document.getElementById('chatPanel');
            if (!selectedLead) { panel.innerHTML = '<div style="padding:40px;text-align:center;color:#444;">Select a lead</div>'; return; }
            panel.innerHTML = '<div class="chat-header"><div><div style="font-weight:bold;font-size:18px">'+selectedLead.name+'</div><div style="font-size:12px;color:#666">'+selectedLead.phone+'</div></div><span class="badge">'+selectedLead.status+'</span></div><div class="chat-messages">'+(messages.length===0?'<div style="color:#444;text-align:center;margin-top:40px">No messages</div>':'')+messages.map(m=>'<div class="message-bubble '+(m.direction==='inbound'?'message-inbound':'message-outbound')+'">'+m.content+'</div>').join('')+'</div><div class="chat-input"><input class="input-msg" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key===\'Enter\')sendMessage()"><button class="btn-send" onclick="sendMessage()">Send</button></div>';
        }
        function sendMessage() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            if (!content || !selectedLead) return;
            messages.push({id:Date.now(),content,direction:'outbound',timestamp:new Date().toISOString()});
            input.value = '';
            renderChat();
        }
        function setView(view) {
            document.getElementById('headerTitle').textContent = view === 'dashboard' ? 'Dashboard' : 'Leads';
            if (view === 'dashboard') {
                document.getElementById('leadList').style.display = 'none';
                showDashboard();
            } else {
                document.getElementById('leadList').style.display = 'flex';
                loadLeads();
            }
        }
        function showDashboard() {
            const panel = document.getElementById('chatPanel');
            panel.innerHTML = '<div class="stats-row"><div class="stat-card"><div class="stat-number">'+leads.length+'</div><div class="stat-label">Total Leads</div></div><div class="stat-card"><div class="stat-number">'+leads.filter(l=>l.status==='new').length+'</div><div class="stat-label">New Leads</div></div><div class="stat-card"><div class="stat-number">35%</div><div class="stat-label">Appointment Rate</div></div><div class="stat-card"><div class="stat-number">80%</div><div class="stat-label">Show Rate</div></div><div class="stat-card"><div class="stat-number">65%</div><div class="stat-label">Close Rate</div></div></div>';
        }
        function logout() { localStorage.removeItem('token'); location.reload(); }
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (email === ADMIN_USER && password === ADMIN_PASS) {
                token = TOKEN;
                localStorage.setItem('token', token);
                showCRM();
                loadLeads();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });
        checkAuth();
    </script>
</body>
</html>
